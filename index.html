<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>THE_DEVIL</title>
  <link rel="icon" href="w.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --w: min(620px, 92vw);
      --w-links: min(480px, 88vw);
      --font: "Space Grotesk", "Segoe UI", sans-serif;
      --font-display: "Cinzel", Georgia, serif;
      --font-code: "JetBrains Mono", Consolas, monospace;
      --fg: #f5dcdc;
      --muted: #bc8f8f;
      --card: rgba(27, 5, 8, 0.84);
      --card-hover: rgba(44, 7, 11, 0.92);
      --stroke: rgba(255, 88, 88, 0.16);
      --accent: #ff5b5b;
      --accent-2: #7a0912;
      --shadow: 0 26px 60px rgba(0, 0, 0, 0.46);
      --rx: 0deg;
      --ry: 0deg;
      --warp: 0px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--fg);
      font: 16px/1.5 var(--font);
      display: grid;
      place-items: center;
      overflow-x: hidden;
      background: #110204;
      opacity: 0;
      animation: fadeIn 0.7s ease forwards;
    }

    body.intro-active {
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(0, 0, 0, 0.28) 72%, rgba(0, 0, 0, 0.7) 100%),
        repeating-linear-gradient(
          -25deg,
          transparent 0 16px,
          rgba(255, 20, 20, 0.028) 16px 20px,
          transparent 20px 48px
        );
      opacity: 0.8;
      mix-blend-mode: multiply;
    }

    body::after {
      background:
        linear-gradient(90deg, transparent 0 44%, rgba(255, 255, 255, 0.018) 44% 45%, transparent 45% 100%),
        linear-gradient(180deg, transparent 0 68%, rgba(255, 70, 70, 0.03) 68% 70%, transparent 70% 100%);
      opacity: 0.38;
      animation: clinicFlash 6.8s steps(1, end) infinite;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(50% 62% at 14% 14%, rgba(255, 92, 92, 0.18), transparent 62%),
        radial-gradient(42% 44% at 86% 12%, rgba(154, 9, 27, 0.22), transparent 58%),
        radial-gradient(72% 58% at 50% 100%, rgba(68, 0, 6, 0.46), transparent 65%),
        linear-gradient(180deg, #250308, #140205 52%, #080102);
      animation: roomPulse 7s ease-in-out infinite;
    }

    .bg::before,
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .bg::before {
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.018) 0,
          rgba(255, 255, 255, 0.018) 2px,
          transparent 2px,
          transparent 7px
        ),
        linear-gradient(120deg, transparent 0 44%, rgba(255, 68, 68, 0.035) 44% 46%, transparent 46% 100%);
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.82), transparent 88%);
      opacity: 0.42;
      animation: scanShift 7s linear infinite;
    }

    .bg::after {
      background:
        linear-gradient(180deg, rgba(27, 2, 5, 0.18), rgba(20, 2, 5, 0.88)),
        url("background.png") center top / cover no-repeat;
      opacity: 0.14;
      mix-blend-mode: lighten;
      animation: bgFlicker 4.4s steps(2, end) infinite;
    }

    .warp {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(240px 240px at var(--cx, 50%) var(--cy, 50%), rgba(255, 78, 78, 0.18), transparent 72%);
      filter: blur(30px);
      transform: translate3d(calc(var(--warp) * 0.08), calc(var(--warp) * -0.05), 0) scale(1.04);
      transition: opacity 0.2s ease;
      opacity: 0.54;
      animation: sirenBeat 3.2s ease-in-out infinite;
    }

    .wrap {
      width: var(--w);
      padding: 28px 16px 58px;
      position: relative;
      z-index: 3;
      transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry));
      transition: transform 0.18s ease-out, filter 0.18s ease-out;
      filter: saturate(1.04) contrast(1.02);
      animation: shellShake 5.4s steps(2, end) infinite;
    }

    body.intro-active .wrap {
      opacity: 0;
      transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry)) scale(0.96);
      filter: blur(10px) saturate(0.86);
      pointer-events: none;
    }

    body.intro-done .wrap {
      opacity: 1;
      transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry)) scale(1);
      filter: saturate(1.04) contrast(1.02);
      transition: opacity 0.7s ease, transform 0.7s ease, filter 0.7s ease;
    }

    body.is-hovering .wrap {
      filter: saturate(1.14) contrast(1.08);
    }

    body.chaos::after {
      opacity: 0.62;
    }

    body.chaos .wrap {
      filter: saturate(1.22) contrast(1.14) blur(0.2px);
    }

    body.chaos .name::before,
    body.chaos .name::after {
      opacity: 0.6;
    }

    .profile {
      position: relative;
      display: flex;
      gap: 18px;
      align-items: center;
      padding: 22px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255, 91, 91, 0.11), transparent 34%),
        linear-gradient(160deg, rgba(122, 9, 18, 0.22), transparent 58%),
        var(--card);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
      animation: frameTremor 6s steps(2, end) infinite;
    }

    .profile:hover {
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.54);
    }

    .profile::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(255, 96, 96, 0.08), transparent),
        radial-gradient(circle at 12% 16%, rgba(255, 255, 255, 0.04), transparent 24%);
      pointer-events: none;
    }

    .profile::after {
      content: "";
      position: absolute;
      inset: auto -12% -46% auto;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 61, 61, 0.16), transparent 64%);
    }

    .pfp {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 129, 129, 0.24);
      box-shadow:
        0 0 0 8px rgba(255, 90, 90, 0.04),
        0 16px 36px rgba(0, 0, 0, 0.42);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .pfp:hover,
    .pfp:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow:
        0 0 0 8px rgba(255, 104, 104, 0.06),
        0 18px 42px rgba(0, 0, 0, 0.48);
      outline: none;
    }

    .meta {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .name {
      position: relative;
      display: inline-block;
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff0f0;
      text-shadow: 0 0 22px rgba(255, 55, 55, 0.16);
      animation: titleFlicker 5.2s steps(1, end) infinite;
    }

    .name::before,
    .name::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
    }

    .name::before {
      color: rgba(255, 42, 42, 0.7);
      transform: translate(-2px, 0);
      clip-path: inset(0 0 46% 0);
      animation: glitchSliceA 2.4s steps(2, end) infinite;
    }

    .name::after {
      color: rgba(255, 210, 210, 0.35);
      transform: translate(2px, 0);
      clip-path: inset(52% 0 0 0);
      animation: glitchSliceB 1.9s steps(2, end) infinite;
    }

    .bio {
      margin: 8px 0 0;
      max-width: 36ch;
      color: var(--muted);
      text-shadow: 0 0 10px rgba(255, 40, 40, 0.06);
    }

    .links {
      width: var(--w-links);
      margin: 18px auto 0;
      display: grid;
      gap: 12px;
    }

    .link {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 18px 20px;
      min-height: 68px;
      color: inherit;
      text-decoration: none;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 42%),
        linear-gradient(180deg, rgba(84, 9, 16, 0.12), transparent 58%),
        var(--card);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.28);
      transition: transform 0.2s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
      backdrop-filter: blur(10px);
      animation: cardBuzz 6.4s steps(2, end) infinite;
    }

    .link:nth-child(odd) {
      transform: rotate(-0.55deg);
    }

    .link:nth-child(even) {
      transform: rotate(0.55deg);
    }

    .link:nth-child(2) {
      animation-delay: 0.3s;
    }

    .link:nth-child(3) {
      animation-delay: 0.7s;
    }

    .link:nth-child(4) {
      animation-delay: 0.5s;
    }

    .link:nth-child(5) {
      animation-delay: 0.9s;
    }

    .link:nth-child(6) {
      animation-delay: 0.2s;
    }

    .link:nth-child(7) {
      animation-delay: 0.8s;
    }

    .link::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(260px 110px at var(--mx, 50%) var(--my, 50%), rgba(255, 101, 101, 0.14), transparent 70%),
        linear-gradient(90deg, rgba(255, 40, 40, 0.04), transparent 30%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .link:nth-child(3n)::before,
    .link:nth-child(3n + 2)::before {
      width: 6px;
      filter: blur(0.4px);
    }

    .link:hover {
      transform: translateY(-4px) scale(1.02) rotate(-0.4deg);
      background: var(--card-hover);
      border-color: rgba(255, 91, 91, 0.28);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.36);
    }

    .link:hover::after,
    .link:focus-visible::after {
      opacity: 1;
    }

    .link:focus-visible {
      outline: none;
      border-color: rgba(255, 91, 91, 0.34);
      box-shadow: 0 0 0 3px rgba(255, 91, 91, 0.12), 0 18px 34px rgba(0, 0, 0, 0.36);
    }

    .text {
      position: relative;
      z-index: 1;
      flex: 1;
      display: grid;
      justify-items: center;
      text-align: center;
    }

    .arrow {
      position: absolute;
      top: 50%;
      right: 20px;
      z-index: 1;
    }

    .title {
      position: relative;
      font: 700 18px/1.1 var(--font-display);
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #fff2f2;
    }

    .title::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: rgba(255, 78, 78, 0.34);
      transform: translate(1px, -1px);
      opacity: 0;
      pointer-events: none;
    }

    .desc {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s ease, color 0.2s ease, letter-spacing 0.2s ease;
    }

    .arrow {
      color: #ff8e8e;
      font: 600 18px/1 var(--font-code);
      opacity: 0.9;
      transform: translateY(-50%) translateX(0);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .link:hover .arrow,
    .link:focus-visible .arrow {
      transform: translateY(-50%) translateX(6px) skewX(-8deg);
      opacity: 1;
    }

    .link:hover .title::before,
    .link:focus-visible .title::before {
      opacity: 1;
      animation: microGlitch 0.25s steps(2, end) 2;
    }

    .link:hover .desc,
    .link:focus-visible .desc {
      color: #f2bbbb;
      transform: translateX(3px);
      letter-spacing: 0.04em;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 60, 60, 0.12), transparent 26%),
        radial-gradient(circle at 50% 78%, rgba(120, 0, 12, 0.22), transparent 34%),
        rgba(7, 0, 1, 0.9);
      backdrop-filter: blur(14px);
      transition: opacity 0.65s ease, visibility 0.65s ease;
      overflow: hidden;
    }

    .intro::before,
    .intro::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .intro::before {
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.018) 0 2px,
          transparent 2px 8px
        ),
        linear-gradient(90deg, transparent 0 48%, rgba(255, 110, 110, 0.045) 48% 52%, transparent 52% 100%);
      animation: introScan 2.8s linear infinite;
    }

    .intro::after {
      background: radial-gradient(circle at 50% 50%, transparent 0 34%, rgba(0, 0, 0, 0.42) 76%, rgba(0, 0, 0, 0.86) 100%);
    }

    .intro.is-leaving {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro__panel {
      position: relative;
      z-index: 1;
      width: min(620px, 100%);
      padding: 30px 28px;
      border: 1px solid rgba(255, 92, 92, 0.18);
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(255, 75, 75, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(30, 2, 5, 0.92), rgba(11, 1, 2, 0.88));
      box-shadow:
        0 34px 90px rgba(0, 0, 0, 0.62),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      animation: introPanelJolt 3.6s steps(2, end) infinite;
    }

    .intro__title {
      margin: 0;
      text-align: center;
      font: 700 clamp(42px, 9vw, 92px)/0.94 var(--font-display);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff1f1;
      text-shadow:
        0 0 28px rgba(255, 64, 64, 0.22),
        0 0 60px rgba(122, 9, 18, 0.24);
      animation: introTitlePulse 1.8s ease-in-out infinite, titleFlicker 3.8s steps(1, end) infinite;
    }

    .intro__title span {
      display: inline-block;
      animation: glyphShift 1.4s steps(2, end) infinite;
    }

    .intro__title span:nth-child(2) {
      animation-delay: 0.1s;
    }

    .intro__title span:nth-child(3) {
      animation-delay: 0.18s;
    }

    .intro__title span:nth-child(4) {
      animation-delay: 0.07s;
    }

    .intro__title span:nth-child(5) {
      animation-delay: 0.14s;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes clinicFlash {
      0%, 9%, 11%, 48%, 50%, 100% {
        opacity: 0.28;
      }

      10%, 49% {
        opacity: 0.5;
      }
    }

    @keyframes roomPulse {
      0%, 100% {
        transform: scale(1);
        filter: brightness(0.92) saturate(1);
      }

      50% {
        transform: scale(1.03);
        filter: brightness(1.08) saturate(1.14);
      }
    }

    @keyframes scanShift {
      0% {
        transform: translate3d(0, 0, 0);
      }

      50% {
        transform: translate3d(0, 8px, 0);
      }

      100% {
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes bgFlicker {
      0%, 14%, 16%, 64%, 66%, 100% {
        opacity: 0.14;
      }

      15%, 65% {
        opacity: 0.2;
      }
    }

    @keyframes sirenBeat {
      0%, 100% {
        opacity: 0.46;
      }

      50% {
        opacity: 0.66;
      }
    }

    @keyframes shellShake {
      0%, 100% {
        transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry)) translate3d(0, 0, 0);
      }

      8% {
        transform: perspective(900px) rotateX(calc(var(--rx) + 0.8deg)) rotateY(calc(var(--ry) - 0.7deg)) translate3d(-1px, 0, 0);
      }

      9% {
        transform: perspective(900px) rotateX(calc(var(--rx) - 0.4deg)) rotateY(calc(var(--ry) + 0.4deg)) translate3d(1px, 0, 0);
      }
    }

    @keyframes frameTremor {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }

      18% {
        transform: translate3d(-1px, 0, 0);
      }

      19% {
        transform: translate3d(1px, 0, 0);
      }

      61% {
        transform: translate3d(0, -1px, 0);
      }

      62% {
        transform: translate3d(0, 1px, 0);
      }
    }

    @keyframes textBlink {
      0%, 48%, 50%, 100% {
        opacity: 0.92;
      }

      49% {
        opacity: 0.36;
      }
    }

    @keyframes titleFlicker {
      0%, 29%, 31%, 72%, 74%, 100% {
        opacity: 1;
      }

      30%, 73% {
        opacity: 0.82;
      }
    }

    @keyframes glitchSliceA {
      0%, 100% {
        transform: translate(-2px, 0);
      }

      20% {
        transform: translate(2px, -1px);
      }

      21% {
        transform: translate(-3px, 1px);
      }
    }

    @keyframes glitchSliceB {
      0%, 100% {
        transform: translate(2px, 0);
      }

      42% {
        transform: translate(-1px, 1px);
      }

      43% {
        transform: translate(3px, -1px);
      }
    }

    @keyframes microGlitch {
      0% {
        transform: translate(1px, -1px);
      }

      50% {
        transform: translate(-2px, 1px);
      }

      100% {
        transform: translate(2px, 0);
      }
    }

    @keyframes cardBuzz {
      0%, 100% {
        filter: brightness(1);
        box-shadow: 0 14px 26px rgba(0, 0, 0, 0.28);
      }

      13% {
        filter: brightness(1.04);
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.32);
      }

      14% {
        filter: brightness(0.98);
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.24);
      }

      15% {
        filter: brightness(1);
        box-shadow: 0 14px 26px rgba(0, 0, 0, 0.28);
      }
    }

    @keyframes introScan {
      0% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(10px);
      }
    }

    @keyframes introPanelJolt {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }

      11% {
        transform: translate3d(-1px, 0, 0);
      }

      12% {
        transform: translate3d(2px, 0, 0);
      }

      13% {
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes introTitlePulse {
      0%, 100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.02);
      }
    }

    @keyframes glyphShift {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }

      48% {
        transform: translate3d(0, 0, 0);
      }

      49% {
        transform: translate3d(-1px, -1px, 0);
      }

      50% {
        transform: translate3d(1px, 1px, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      body.intro-active .wrap,
      body.intro-done .wrap {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }

    @media (max-width: 600px) {
      :root {
        --w: 96vw;
        --w-links: 96vw;
      }

      body {
        place-items: start center;
      }

      .wrap {
        padding: 18px 10px 34px;
        transform: none !important;
      }

      .profile {
        padding: 18px;
        gap: 14px;
        align-items: flex-start;
      }

      .pfp {
        width: 70px;
        height: 70px;
      }

      .name {
        font-size: clamp(24px, 8vw, 32px);
      }

      .bio {
        max-width: none;
      }

      .link {
        min-height: 58px;
        padding: 16px 18px;
        transform: none;
      }

      .intro__panel {
        padding: 24px 20px;
      }

      .intro__title {
        letter-spacing: 0.08em;
      }

      .warp {
        opacity: 0.3;
      }

      .bg::after {
        background-position: center;
      }
    }
  </style>
</head>
<body class="intro-active">
  <div class="intro" id="intro" role="dialog" aria-label="Intro">
    <div class="intro__panel">
      <div class="intro__title" aria-label="DREIJI.PL">
        <span>D</span><span>R</span><span>E</span><span>I</span><span>J</span><span>I</span><span>.</span><span>P</span><span>L</span>
      </div>
    </div>
  </div>
  <div class="bg" aria-hidden="true"></div>
  <div class="warp" aria-hidden="true"></div>
  <main class="wrap">
    <header class="profile">
      <img
        class="pfp"
        src="avatar.png"
        alt="avatar"
        tabindex="0"
        onclick="location.href='/vault-r3d-only-9d8f6a/'"
        onkeydown="if(event.key==='Enter') location.href='/vault-r3d-only-9d8f6a/'"
      />

  <script>
    const opts = { passive: true };
    const intro = document.getElementById("intro");
    const links = document.querySelectorAll(".link");

    links.forEach((el) => {
      const move = (e) => {
        const t = e.touches ? e.touches[0] : e;
        const r = el.getBoundingClientRect();
        el.style.setProperty("--mx", ((t.clientX - r.left) / r.width) * 100 + "%");
        el.style.setProperty("--my", ((t.clientY - r.top) / r.height) * 100 + "%");
      };

      el.addEventListener("mousemove", move, opts);
      el.addEventListener("touchstart", move, opts);
      el.addEventListener("touchmove", move, opts);
      el.addEventListener("mouseenter", () => document.body.classList.add("is-hovering"), opts);
      el.addEventListener("mouseleave", () => document.body.classList.remove("is-hovering"), opts);

      const clear = () => {
        el.style.removeProperty("--mx");
        el.style.removeProperty("--my");
      };

      el.addEventListener("mouseleave", clear, opts);
      el.addEventListener("touchend", clear, opts);
      el.addEventListener("touchcancel", clear, opts);
    });

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    let introClosed = false;

    const dismissIntro = () => {
      if (!intro || introClosed) {
        return;
      }

      introClosed = true;
      intro.classList.add("is-leaving");
      document.body.classList.remove("intro-active");
      document.body.classList.add("intro-done");

      window.setTimeout(() => {
        intro.remove();
      }, 700);
    };

    if (intro) {
      const introDelay = reduceMotion ? 900 : 2800;
      const autoIntro = window.setTimeout(dismissIntro, introDelay);

      intro.addEventListener("click", (event) => {
        if (event.target === intro) {
          window.clearTimeout(autoIntro);
          dismissIntro();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (!introClosed && (event.key === "Enter" || event.key === " " || event.key === "Escape")) {
          window.clearTimeout(autoIntro);
          dismissIntro();
        }
      });
    }

    if (!reduceMotion) {
      const triggerChaos = () => {
        document.body.classList.add("is-hovering");
        document.body.classList.toggle("chaos", Math.random() > 0.5);
        window.setTimeout(() => {
          document.body.classList.remove("chaos");
          if (!document.querySelector(".link:hover")) {
            document.body.classList.remove("is-hovering");
          }
        }, 120 + Math.random() * 160);
      };

      window.setInterval(() => {
        if (Math.random() > 0.78) {
          triggerChaos();
        }
      }, 900);
    }

    if (!reduceMotion) {
      const intensity = document.body.classList.contains("is-hovering") ? 16 : 7;
      const wobble = Math.sin(Date.now() * 0.012) * intensity;
      document.documentElement.style.setProperty("--warp", wobble.toFixed(2) + "px");
    }
  </script>
