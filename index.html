<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>THE_DEVIL</title>
  <link rel="icon" href="w.png" />
    <style>
    :root{
      --w: min(560px, 92vw);
      --w-links: min(430px, 88vw);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-code: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
      --fg:#e9ebef;
      --muted:#9aa0aa;
      --card:#1a1d23;
      --card-hover:#22262e;
      --stroke:#343944;
      --radius: 16px;
      --rx: 0deg;
      --ry: 0deg;
      --warp: 0px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--fg);
      font:16px/1.5 var(--font);
      min-height:100%;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#0f1115;
      opacity:0;
      animation:fadeIn .6s ease forwards;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(65% 50% at 50% -10%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(90% 60% at 20% 100%, rgba(255,255,255,.04), transparent 68%),
        linear-gradient(180deg, #171a20, #0f1115 64%, #0b0d11);
    }

    .warp{
      position:fixed;
      inset:-20%;
      pointer-events:none;
      z-index:1;
      background: radial-gradient(200px 200px at var(--cx,50%) var(--cy,50%), rgba(255,255,255,.08), transparent 70%);
      filter: blur(22px);
      transform: translate3d(calc(var(--warp) * .08), calc(var(--warp) * -.05), 0) scale(1.04);
      transition: opacity .2s ease;
      opacity:.35;
    }

    #cursorFx{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:2;
      opacity:.9;
      mix-blend-mode:screen;
    }

    .wrap{
      width:var(--w);
      padding:24px 16px 54px;
      position:relative;
      z-index:3;
      transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry));
      transition: transform .18s ease-out, filter .18s ease-out;
      filter: saturate(1);
    }

    body.is-hovering .wrap{ filter: saturate(1.08) contrast(1.03); }

    header.profile{
      position:relative;
      display:flex;
      gap:14px;
      align-items:center;
      padding:16px;
      border-radius: var(--radius);
      background: var(--card);
      border:1px solid var(--stroke);
      box-shadow: 0 8px 25px rgba(0,0,0,.35);
    }

    .pfp{
      width:72px;
      height:72px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid var(--stroke);
    }

    .name{margin:0; font-size:clamp(22px,3.4vw,28px); letter-spacing:.2px; color:#f2f3f5}
    .bio{margin:4px 0 0; color:var(--muted)}

    .links{ width: var(--w-links); margin: 16px auto 0; display:grid; gap:10px; }

    .link{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:16px;
      min-height:58px;
      color:inherit;
      text-decoration:none;
      cursor:pointer;
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: 14px;
      box-shadow: 0 7px 18px rgba(0,0,0,.25);
      transition: transform .2s ease, background .25s ease, border-color .25s ease;
      overflow:hidden;
    }

    .link::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background: radial-gradient(220px 100px at var(--mx,50%) var(--my,50%), rgba(255,255,255,.11), transparent 70%);
      opacity:0;
      transition:opacity .2s ease;
    }

    .link:hover{
      transform: translateY(-1px) scale(1.006);
      background: var(--card-hover);
      border-color:#4a5160;
    }
    .link:hover::after{ opacity:1 }

    .title{font:650 20px/1 var(--font-code); letter-spacing:.1px}
    .desc {font-size:12px; color:var(--muted); margin-top:4px}

    @keyframes fadeIn{ to{ opacity:1 } }

    @media (max-width: 600px){
      :root{ --w:96vw; --w-links:96vw; --radius:14px; }
      .wrap{ padding:16px 10px 34px; transform:none !important; }
      header.profile{ padding:14px; }
      .pfp{ width:62px; height:62px; }
      .link{ min-height:50px; padding:14px; }
      #cursorFx{ display:none; }
      .warp{ opacity:.2; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="warp" aria-hidden="true"></div>
  <canvas id="cursorFx" aria-hidden="true"></canvas>

  <main class="wrap">
    <header class="profile">
      <img class="pfp" src="avatar.png" alt="avatar" tabindex="0"
           onclick="location.href='/vault-r3d-only-9d8f6a/'"
           onkeydown="if(event.key==='Enter') location.href='/vault-r3d-only-9d8f6a/'">
      <div class="meta">
        <h1 class="name">dreiji</h1>
        <p class="bio">piszę za dużo i śpię za mało</p>
      </div>
    </header>

    <section class="links" id="links">
      <div class="link" onclick="window.open('https://www.instagram.com/dreiji_/', '_blank')">
        <div class="title">Instagram</div>
      </div>
      <div class="link" onclick="window.open('https://www.youtube.com/@dreijiwtf', '_blank')">
        <div class="title">YouTube</div>
      </div>
      <div class="link" onclick="window.open('https://open.spotify.com/user/q4qar66nrdz396d67bpfbv952', '_blank')">
        <div class="title">Spotify</div>
      </div>
      <div class="link" onclick="window.open('https://discord.com/users/278065747199131650', '_blank')">
        <div class="title">Discord</div>
      </div>
      <div class="link" onclick="window.open('https://twitch.tv/dreiji', '_blank')">
        <div>
          <div class="title">Twitch</div>
          <div class="desc">live czasem</div>
        </div>
      </div>
      <div class="link" onclick="window.open('https://mail.google.com/mail/?view=cm&fs=1&to=kontakt@dreiji.pl', '_blank')">
        <div class="title">Mail</div>
      </div>
      <div class="link" onclick="window.open('https://x.com/Dreiji_', '_blank')">
        <div class="title">X</div>
      </div>
    </section>
  </main>

    <script>
    const opts = { passive: true };
    const links = document.querySelectorAll('.link');
    links.forEach(el => {
      const move = e => {
        const t = e.touches ? e.touches[0] : e;
        const r = el.getBoundingClientRect();
        el.style.setProperty('--mx', ((t.clientX - r.left) / r.width * 100) + '%');
        el.style.setProperty('--my', ((t.clientY - r.top) / r.height * 100) + '%');
      };
      el.addEventListener('mousemove', move, opts);
      el.addEventListener('touchstart', move, opts);
      el.addEventListener('touchmove', move, opts);
      el.addEventListener('mouseenter', () => document.body.classList.add('is-hovering'), opts);
      el.addEventListener('mouseleave', () => document.body.classList.remove('is-hovering'), opts);
      const clear = () => { el.style.removeProperty('--mx'); el.style.removeProperty('--my'); };
      el.addEventListener('mouseleave', clear, opts);
      el.addEventListener('touchend', clear, opts);
      el.addEventListener('touchcancel', clear, opts);
    });

    const finePointer = window.matchMedia('(pointer:fine)').matches;
    if (finePointer) {
      const canvas = document.getElementById('cursorFx');
      const ctx = canvas.getContext('2d');
      let w = 0, h = 0;
      let particles = [];
      let hue = 0;

      const resize = () => {
        w = canvas.width = window.innerWidth * devicePixelRatio;
        h = canvas.height = window.innerHeight * devicePixelRatio;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      };
      resize();
      window.addEventListener('resize', resize, opts);

      let tx = window.innerWidth / 2;
      let ty = window.innerHeight / 2;
      let px = tx;
      let py = ty;

      const onMove = e => {
        tx = e.clientX;
        ty = e.clientY;
        document.documentElement.style.setProperty('--cx', tx + 'px');
        document.documentElement.style.setProperty('--cy', ty + 'px');

        const dx = (tx / window.innerWidth - 0.5) * 2;
        const dy = (ty / window.innerHeight - 0.5) * 2;
        document.documentElement.style.setProperty('--ry', (dx * 1.9).toFixed(2) + 'deg');
        document.documentElement.style.setProperty('--rx', (-dy * 1.9).toFixed(2) + 'deg');
      };
      window.addEventListener('mousemove', onMove, opts);

      const render = () => {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        px += (tx - px) * 0.24;
        py += (ty - py) * 0.24;

        for (let i = 0; i < 3; i++) {
          hue = (hue + 7) % 360;
          particles.push({
            x: px + (Math.random() - 0.5) * 10,
            y: py + (Math.random() - 0.5) * 10,
            vx: (Math.random() - 0.5) * 0.8,
            vy: (Math.random() - 0.5) * 0.8,
            life: 1,
            size: 7 + Math.random() * 9,
            hue
          });
        }

        particles = particles.filter(p => p.life > 0.03);
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.life *= 0.94;
          p.size *= 0.985;

          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          g.addColorStop(0, `hsla(${p.hue}, 95%, 65%, ${p.life})`);
          g.addColorStop(1, `hsla(${p.hue}, 95%, 65%, 0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }

        const intensity = document.body.classList.contains('is-hovering') ? 16 : 7;
        const wobble = Math.sin(Date.now() * 0.012) * intensity;
        document.documentElement.style.setProperty('--warp', wobble.toFixed(2) + 'px');

        requestAnimationFrame(render);
      };
      render();

      window.addEventListener('mouseleave', () => {
        document.documentElement.style.setProperty('--rx', '0deg');
        document.documentElement.style.setProperty('--ry', '0deg');
      }, opts);
    }
  </script>
</body>
</html>
