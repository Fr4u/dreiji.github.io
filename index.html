<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>THE_DEVIL</title>
  <link rel="icon" href="w.png" />
  <style>
    :root{
      --w: min(600px, 92vw);
      --w-links: min(460px, 88vw);
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Roboto, Arial, sans-serif;
      --font-code: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
      --fg:#f2f5fb;
      --muted:#8f98a8;
      --card:#13161c;
      --card-hover:#171b24;
      --stroke:#232b38;
      --stroke-soft:#1d2430;
      --accent:#66d9ef;
      --accent-2:#f92672;
      --radius: 20px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0; color:var(--fg); font:16px/1.55 var(--font);
      min-height:100%; display:grid; place-items:center; overflow:hidden;
      background:#0c0f14;
      opacity:0; animation:fadeIn 1.2s ease forwards;
    }

    .bg{
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        radial-gradient(60% 40% at 15% 0%, rgba(249,38,114,.1), transparent 60%),
        radial-gradient(40% 30% at 90% 10%, rgba(102,217,239,.13), transparent 70%),
        linear-gradient(180deg, #0f131b, #090b10 60%, #080a0e);
      background-size: 100% 100%;
      background-position:center;
    }

    .wrap{ width:var(--w); padding:28px 16px 64px; position:relative; z-index:1; }

    header.profile{
      position:relative;
      display:flex; gap:18px; align-items:center; padding:18px 20px;
      border-radius: var(--radius);
      background: var(--card);
      border:1px solid var(--stroke);
      box-shadow: 0 18px 45px rgba(0,0,0,.45);
      overflow:hidden;
      opacity:0;
      animation: headerIn 1.2s cubic-bezier(.2,.8,.2,1) .1s forwards;
    }
    header.profile::before{
      content:"</>  C++";
      position:absolute;
      top:10px;
      left:16px;
      font:700 12px/1 var(--font-code);
      letter-spacing:.4px;
      color:var(--fg);
      opacity:.92;
    }
    header.profile::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background: linear-gradient(90deg, rgba(249,38,114,.08), transparent 28%, transparent 72%, rgba(102,217,239,.08));
    }
    @keyframes headerIn{
      0%   { opacity:0; transform: translateY(8px) scale(.98) }
      60%  { opacity:1; border-color: var(--stroke-soft) }
      100% { opacity:1; transform: none }
    }

    .pfp{
      width:88px; height:88px; border-radius:50%; object-fit:cover;
      border:2px solid var(--stroke);
      box-shadow: 0 0 0 4px rgba(102,217,239,.08);
      animation: breathe 6s ease-in-out 1.4s infinite;
      margin-top: 12px;
    }

    .name{margin:0; font-size:clamp(22px,3.4vw,30px); letter-spacing:.2px; opacity:0; animation: textIn 1s ease .8s forwards; color:#a6e22e}
    .bio {margin:6px 0 0; color:var(--muted); opacity:0; animation: textIn 1s ease 1s forwards}
    @keyframes textIn{ from{ transform: translateY(4px); opacity:0 } to{ transform:none; opacity:1 } }

    .links{ width: var(--w-links); margin: 22px auto 0; display:grid; gap:14px; }

    .link{
      position:relative; display:flex; align-items:center; justify-content:center; text-align:center;
      padding:18px; border-radius:18px;
      color:inherit; text-decoration:none; cursor:pointer;
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      translate: 0 6px; scale:.985; transform: translateZ(0);
      opacity:0;
      animation: linkIn 1.2s cubic-bezier(.2,.8,.2,1) forwards;
      overflow:hidden;
      transition: translate .35s ease, scale .35s ease, box-shadow .35s ease,
                 border-color .45s ease, background .45s ease, filter .3s ease;
    }
    .link::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      width:3px;
      height:100%;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      opacity:.6;
      transition: opacity .3s ease;
    }
    .link::after{
      content:""; position:absolute; inset:0; border-radius:20px; pointer-events:none;
      background: radial-gradient(260px 120px at var(--mx,50%) var(--my,50%), rgba(102,217,239,.12), transparent 65%);
      opacity:0; transition: opacity .35s ease;
    }
    @keyframes linkIn{
      0%   { opacity:0; transform: translateY(8px) scale(.98); border-color:transparent; background: #11141a }
      55%  { opacity:1; border-color: var(--stroke-soft); background: var(--card) }
      100% { opacity:1; border-color: var(--stroke); background: var(--card); transform:none }
    }

    .links .link:nth-child(1){ animation-delay:.18s }
    .links .link:nth-child(2){ animation-delay:.36s }
    .links .link:nth-child(3){ animation-delay:.54s }
    .links .link:nth-child(4){ animation-delay:.72s }
    .links .link:nth-child(5){ animation-delay:.90s }
    .links .link:nth-child(6){ animation-delay:1.08s }
    .links .link:nth-child(7){ animation-delay:1.26s }

    .link:hover{
      border-color: color-mix(in oklab, var(--accent) 35%, var(--stroke));
      background: var(--card-hover);
      box-shadow: 0 12px 30px rgba(0,0,0,.45), 0 0 0 1px rgba(102,217,239,.16) inset;
      translate: 0 -2px;            /* mniejsze unoszenie */
      scale: 1.01;                   /* mniejsze powiększenie */
      filter: brightness(1.02) contrast(1.02);
    }
    .link:hover::after{ opacity:1 }

    .title{font:700 23px/1 var(--font-code); letter-spacing:.2px}
    .desc {font-size:13px; color:var(--muted); margin-top:4px}

    .sr-only{
      position:absolute; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }

    /* ANIMS */
    @keyframes fadeIn{ to{ opacity:1 } }
    @keyframes breathe{ 0%,100%{ transform: scale(1) } 50%{ transform: scale(1.03) } }

    /* MOBILE FIXES */
@media (max-width: 600px){
  :root{
    --w: 96vw;
    --w-links: 96vw;        
    --radius: 18px;           
  }

  *{ -webkit-tap-highlight-color: transparent; }

  body{ font-size: 15px; }
  .wrap{
    width: var(--w);
    padding: max(16px, env(safe-area-inset-top)) 
             max(12px, env(safe-area-inset-right))
             40px
             max(12px, env(safe-area-inset-left));
  }

  header.profile{
    padding:14px 16px; gap:12px; border-radius: var(--radius);
    border:1px solid var(--stroke);
    background: var(--card);
    box-shadow: 0 6px 16px rgba(0,0,0,.35);
    animation-duration: .9s;
  }
  .pfp{ width:64px; height:64px; }
  .name{ font-size: clamp(18px, 5.2vw, 22px); }
  .bio { font-size: 13px; }

  .links{ width:100%; gap:12px; margin-top:16px; }

  .link{
    width:100%;
    padding:14px 16px; min-height:48px; border-radius: var(--radius);
    border:1px solid var(--stroke);
    background: var(--card);
    box-shadow: 0 6px 16px rgba(0,0,0,.35);
    transform:none;
    animation-duration: .9s;
  }


  .link::after{
    background: radial-gradient(150px 60px at var(--mx,50%) var(--my,50%),
                rgba(102,217,239,.14), transparent 60%);
  }


  .link:hover{ translate: 0 -1px; scale: 1.004; box-shadow: 0 8px 18px rgba(0,0,0,.38); }
  .link:active{ translate: 0 -2px; scale: 1; transition-duration: .08s; }
}


@media (max-width: 360px){
  .pfp{ width:56px; height:56px; }
  .link{ padding:12px 14px; min-height:44px; }
  .title{ font-size: 15px; }
  .desc { font-size: 12px; }
}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="wrap">
    <header class="profile">
      <img class="pfp" src="avatar.png" alt="avatar" tabindex="0"
           onclick="location.href='/vault-r3d-only-9d8f6a/'"
           onkeydown="if(event.key==='Enter') location.href='/vault-r3d-only-9d8f6a/'">
      <div class="meta">
        <h1 class="name">dreiji</h1>
        <p class="bio">piszę za dużo i śpię za mało</p>
      </div>
    </header>

    <section class="links" id="links">
      <div class="link" onclick="window.open('https://www.instagram.com/dreiji_/', '_blank')">
        <div class="title">Instagram</div>
      </div>
      <div class="link" onclick="window.open('https://www.youtube.com/@dreijiwtf', '_blank')">
        <div class="title">YouTube</div>
      </div>
      <div class="link" onclick="window.open('https://open.spotify.com/user/q4qar66nrdz396d67bpfbv952', '_blank')">
        <div class="title">Spotify</div>
      </div>
      <div class="link" onclick="window.open('https://discord.com/users/278065747199131650', '_blank')">
        <div class="title">Discord</div>
      </div>
      <div class="link" onclick="window.open('https://twitch.tv/dreiji', '_blank')">
        <div>
          <div class="title">Twitch</div>
          <div class="desc">live czasem</div>
        </div>
      </div>
      <div class="link" onclick="window.open('https://mail.google.com/mail/?view=cm&fs=1&to=kontakt@dreiji.pl', '_blank')">
        <div class="title">Mail</div>
      </div>
      <div class="link" onclick="window.open('https://x.com/Dreiji_', '_blank')">
        <div class="title">X</div>
      </div>
    </section>
  </main>

  <script>
    const opts = {passive:true};
    document.querySelectorAll('.link').forEach(el=>{
      const move = e=>{
        const t = e.touches ? e.touches[0] : e;
        const r = el.getBoundingClientRect();
        el.style.setProperty('--mx', ((t.clientX - r.left)/r.width*100)+'%');
        el.style.setProperty('--my', ((t.clientY - r.top )/r.height*100)+'%');
      };
      el.addEventListener('mousemove', move, opts);
      el.addEventListener('touchstart', move, opts);
      el.addEventListener('touchmove', move, opts);
      const clear = ()=>{ el.style.removeProperty('--mx'); el.style.removeProperty('--my'); };
      el.addEventListener('mouseleave', clear, opts);
      el.addEventListener('touchend', clear, opts);
      el.addEventListener('touchcancel', clear, opts);
    });
  </script>
</body>
</html>
